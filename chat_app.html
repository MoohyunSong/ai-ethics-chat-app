<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마음 곁에 ― 다중 페르소나 상담 챗봇</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-1: #FFF6EC;
    --bg-2: #F0F5FF;
    --bg-3: #FAF0F5;
    --ink: #3A3A3A;
    --ink-soft: #6B6B6B;
    --card: #FFFFFF;
    --shadow: 0 8px 24px rgba(120, 120, 140, 0.12);
    --shadow-hover: 0 12px 32px rgba(120, 120, 140, 0.18);
    --persona-color: #B8D8BA;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", sans-serif;
    color: var(--ink);
    background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
    overflow: hidden;
  }

  /* 배경 둥둥 떠다니는 모양 */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.4;
    z-index: 0;
    pointer-events: none;
  }
  body::before {
    width: 380px; height: 380px;
    background: #FFD8C2;
    top: -80px; left: -100px;
    animation: float1 18s ease-in-out infinite;
  }
  body::after {
    width: 460px; height: 460px;
    background: #D8E5F5;
    bottom: -120px; right: -120px;
    animation: float2 22s ease-in-out infinite;
  }
  @keyframes float1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(40px, 30px) scale(1.05); }
  }
  @keyframes float2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-30px, -20px) scale(0.95); }
  }

  .app {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 20px 20px;
  }

  /* ─── 상단 헤더 ─── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 4px 20px;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.3px;
  }
  .header .subtitle {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 2px;
  }
  .switch-btn {
    padding: 8px 14px;
    border: 1px solid #E0E0E0;
    background: #FFFFFFCC;
    backdrop-filter: blur(8px);
    border-radius: 999px;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s;
  }
  .switch-btn:hover {
    background: #FFFFFF;
    box-shadow: var(--shadow);
  }
  .switch-btn.hidden { display: none; }

  /* ─── 페르소나 선택 화면 ─── */
  .picker {
    flex: 1;
    overflow-y: auto;
    padding: 8px 4px 20px;
  }
  .picker.hidden { display: none; }
  .picker-intro {
    text-align: center;
    margin-bottom: 28px;
    padding: 12px 8px;
  }
  .picker-intro .title {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .picker-intro .desc {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.6;
  }
  .persona-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .persona-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 18px;
    background: var(--card);
    border-radius: 18px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.25s ease;
    border: 2px solid transparent;
  }
  .persona-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
    border-color: var(--card-accent);
  }
  .persona-card .icon-bubble {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--card-accent);
    display: grid;
    place-items: center;
    font-size: 28px;
    flex-shrink: 0;
  }
  .persona-card .meta {
    flex: 1;
    min-width: 0;
  }
  .persona-card .meta .name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .persona-card .meta .intro {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.5;
  }
  .persona-card .arrow {
    color: #BBB;
    font-size: 18px;
    flex-shrink: 0;
  }

  .picker-footer {
    margin-top: 24px;
    padding: 16px;
    background: #FFFCF4;
    border: 1px dashed #E8D8B0;
    border-radius: 14px;
    font-size: 12px;
    color: #8A7340;
    line-height: 1.6;
  }
  .picker-footer strong { color: #6D5A2A; }

  /* ─── 채팅 화면 ─── */
  .chat-view {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    box-shadow: var(--shadow);
    padding: 0;
  }
  .chat-view.hidden { display: none; }

  .chat-persona-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
  }
  .chat-persona-bar .icon-bubble {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--persona-color);
    display: grid;
    place-items: center;
    font-size: 20px;
  }
  .chat-persona-bar .name {
    font-size: 15px;
    font-weight: 700;
  }
  .chat-persona-bar .desc {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 1px;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    word-wrap: break-word;
    animation: pop-in 0.25s ease;
  }
  @keyframes pop-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.bot {
    background: var(--persona-color);
    color: #2C2C2C;
    border-bottom-left-radius: 6px;
    align-self: flex-start;
  }
  .msg.user {
    background: #FFFFFF;
    color: var(--ink);
    border: 1px solid rgba(0, 0, 0, 0.06);
    border-bottom-right-radius: 6px;
    align-self: flex-end;
  }
  .msg.system {
    align-self: center;
    background: rgba(255, 255, 255, 0.6);
    color: var(--ink-soft);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 12px;
    max-width: 90%;
    text-align: center;
  }
  .typing {
    align-self: flex-start;
    padding: 14px 18px;
    background: var(--persona-color);
    border-radius: 18px;
    border-bottom-left-radius: 6px;
    display: inline-flex;
    gap: 4px;
  }
  .typing span {
    width: 7px; height: 7px;
    background: #2C2C2C66;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .input-bar {
    display: flex;
    gap: 10px;
    padding: 14px 16px 16px;
    border-top: 1px solid rgba(0, 0, 0, 0.05);
  }
  .input-bar textarea {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #E0E0E0;
    border-radius: 18px;
    background: #FFFFFF;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    resize: none;
    min-height: 44px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-bar textarea:focus { border-color: var(--persona-color); }
  .input-bar button {
    padding: 0 20px;
    background: var(--persona-color);
    color: #2C2C2C;
    border: none;
    border-radius: 18px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: filter 0.2s, opacity 0.2s;
    min-width: 60px;
  }
  .input-bar button:hover { filter: brightness(0.95); }
  .input-bar button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 스크롤바 슬림 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb {
    background: rgba(0, 0, 0, 0.1);
    border-radius: 999px;
  }

  /* 모바일 살짝 대응 */
  @media (max-width: 540px) {
    .app { padding: 16px 12px 12px; }
    .picker-intro .title { font-size: 22px; }
    .persona-card { padding: 14px; }
    .persona-card .icon-bubble { width: 48px; height: 48px; font-size: 24px; }
  }
</style>
</head>
<body>
  <div class="app">

    <!-- 상단 헤더 -->
    <div class="header">
      <div>
        <h1>마음 곁에</h1>
        <div class="subtitle">상황에 따라 다른 자격으로 말하는 챗봇</div>
      </div>
      <button class="switch-btn hidden" id="switchBtn">↻ 페르소나 바꾸기</button>
    </div>

    <!-- 페르소나 선택 화면 -->
    <div class="picker" id="picker">
      <div class="picker-intro">
        <div class="title">오늘은 어떤 곁이 필요하세요?</div>
        <div class="desc">
          상황에 맞는 페르소나를 골라 주세요.<br>
          대화 중에도 언제든 다시 바꿀 수 있어요.
        </div>
      </div>
      <div class="persona-list" id="personaList"></div>
      <div class="picker-footer">
        <strong>※ 이 챗봇은 전문 상담을 대체하지 않습니다.</strong><br>
        위급한 상황이라면 자살예방상담전화 <strong>1393</strong>, 정신건강위기상담전화 <strong>1577-0199</strong>로 연락해 주세요.
      </div>
    </div>

    <!-- 채팅 화면 -->
    <div class="chat-view hidden" id="chatView">
      <div class="chat-persona-bar">
        <div class="icon-bubble" id="chatIcon">🌿</div>
        <div>
          <div class="name" id="chatName">일상 청취</div>
          <div class="desc" id="chatDesc">Rogers 무비판적 청취</div>
        </div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="input-bar">
        <textarea id="input" placeholder="마음에 떠오르는 것을 적어 주세요... (Enter로 전송)" rows="1"></textarea>
        <button id="sendBtn">보내기</button>
      </div>
    </div>

  </div>

<script>
const PERSONA_DESC = {
  listen: 'Rogers 무비판적 청취',
  cbt: 'CBT 인지 재구성',
  mi: '동기강화상담(MI)',
  grief: '사별 동행',
  crisis: '위기 연계 (1393)',
};

let personas = {};
let currentPersona = null;
let history = [];

const $picker = document.getElementById('picker');
const $personaList = document.getElementById('personaList');
const $chatView = document.getElementById('chatView');
const $messages = document.getElementById('messages');
const $input = document.getElementById('input');
const $sendBtn = document.getElementById('sendBtn');
const $switchBtn = document.getElementById('switchBtn');
const $chatIcon = document.getElementById('chatIcon');
const $chatName = document.getElementById('chatName');
const $chatDesc = document.getElementById('chatDesc');

// 페르소나 메타데이터 로드
async function loadPersonas() {
  const res = await fetch('/api/personas');
  personas = await res.json();
  renderPersonaList();
}

function renderPersonaList() {
  $personaList.innerHTML = '';
  Object.entries(personas).forEach(([key, p]) => {
    const card = document.createElement('div');
    card.className = 'persona-card';
    card.style.setProperty('--card-accent', p.color);
    card.innerHTML = `
      <div class="icon-bubble">${p.icon}</div>
      <div class="meta">
        <div class="name">${p.name}</div>
        <div class="intro">${p.intro}</div>
      </div>
      <div class="arrow">›</div>
    `;
    card.addEventListener('click', () => selectPersona(key));
    $personaList.appendChild(card);
  });
}

function selectPersona(key) {
  currentPersona = key;
  history = [];
  const p = personas[key];

  // 상단 바와 색 갱신
  $chatIcon.textContent = p.icon;
  $chatIcon.style.background = p.color;
  $chatName.textContent = p.name;
  $chatDesc.textContent = PERSONA_DESC[key] || '';

  // CSS 변수로 페르소나 컬러 전체 적용
  document.documentElement.style.setProperty('--persona-color', p.color);

  // 화면 전환
  $picker.classList.add('hidden');
  $chatView.classList.remove('hidden');
  $switchBtn.classList.remove('hidden');

  // 시작 메시지
  $messages.innerHTML = '';
  addMessage('system', `${p.name} 페르소나로 대화를 시작합니다.`);
  addMessage('bot', p.intro);

  // 포커스
  setTimeout(() => $input.focus(), 100);
}

function showPicker() {
  $picker.classList.remove('hidden');
  $chatView.classList.add('hidden');
  $switchBtn.classList.add('hidden');
  currentPersona = null;
  history = [];
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  $messages.appendChild(div);
  $messages.scrollTop = $messages.scrollHeight;
  return div;
}

function showTyping() {
  const t = document.createElement('div');
  t.className = 'typing';
  t.id = '__typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  $messages.appendChild(t);
  $messages.scrollTop = $messages.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('__typing');
  if (t) t.remove();
}

async function send() {
  const text = $input.value.trim();
  if (!text || !currentPersona) return;

  $input.value = '';
  $input.style.height = 'auto';
  addMessage('user', text);
  history.push({ role: 'user', content: text });
  $sendBtn.disabled = true;
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        persona: currentPersona,
        message: text,
        history: history,
      }),
    });
    const data = await res.json();
    hideTyping();
    addMessage('bot', data.response);
    history.push({ role: 'assistant', content: data.response });
  } catch (err) {
    hideTyping();
    addMessage('system', '⚠️ 네트워크 오류: ' + err.message);
  } finally {
    $sendBtn.disabled = false;
    $input.focus();
  }
}

// 이벤트 바인딩
$sendBtn.addEventListener('click', send);
$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
$input.addEventListener('input', () => {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
});
$switchBtn.addEventListener('click', showPicker);

loadPersonas();
</script>
</body>
</html>
